name: Update Bazaar Data

on:
  schedule:
    # Every 30 minutes. Hypixel's own bazaar data refreshes ~once a minute,
    # so there's no benefit going much faster than this - it just burns
    # Actions minutes. Edit the cron string to change frequency.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit data.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch bazaar data and rebuild docs/data.json
        env:
          VOLUME_THRESHOLD: "90000"
          SPREAD_THRESHOLD_PCT: "20"
          WINDOW_DAYS: "5"
          POLL_INTERVAL_MINUTES: "30"
        run: python scripts/poll_bazaar.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update bazaar data [skip ci]"
          git push
